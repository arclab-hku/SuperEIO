%YAML:1.0
---

#common parameters
# imu_topic: "/davis_left/imu"
# image_topic: "/davis_left/image_raw"
# event_topic: "/davis_left/events"
imu_topic: "/dvs/imu"
image_topic: "/dvs/image_raw"
event_topic: "/dvs/events"
output_path: "/home/cpy/Datasets/output"

#camera calibration 
model_type: PINHOLE
camera_name: camera
image_width: 346
image_height: 260
distortion_parameters:
   k1: -0.38932940078766665
   k2: 0.15946398959767422
   p1: 0.0014881647414925019
   p2: -0.001559345555442927
projection_parameters:
   fx: 243.48247333418462
   fy: 242.83437823452573
   cx: 177.22191130442948
   cy: 117.92833352552883

# Extrinsic parameter between IMU and Camera.
estimate_extrinsic: 0   # 0  Have an accurate extrinsic parameters. We will trust the following imu^R_cam, imu^T_cam, don't change it.
                        # 1  Have an initial guess about extrinsic parameters. We will optimize around your initial guess.
                        # 2  Don't know anything about extrinsic parameters. You don't need to give R,T. We will try to calibrate it. Do some rotation movement at beginning.                        
#If you choose 0 or 1, you should write down the following matrix.
#Rotation from camera frame to imu frame, imu^R_cam
extrinsicRotation: !!opencv-matrix
   rows: 3
   cols: 3
   dt: d
   data: [0.9999753053324051, 0.006905011005070413, 0.0013074969919475627,  
          -0.006931657320073936, 0.9997424741414513, 0.02160873722195405,
          -0.0011579517093388936, -0.021617266722466402, 0.9997656490034499]

   # #### T_i2_i * T_i_c = [0,0,1;-1,0,0;0,-1,0]* T_i_c flight version ####
   # data: [0.00729100,0.00511899,0.99996032,  
   #        -0.99995523,-0.00599467,0.00732165,
   #        0.00603191,-0.99996893,0.00507505 ]

#Translation from camera frame to imu frame, imu^T_cam
extrinsicTranslation: !!opencv-matrix
   rows: 3
   cols: 1
   dt: d
   data: [ -0.018893229759534197,0.05160580577503306, -0.01710979913221666]

   # #### T_i2_i * T_i_c = [0,0,1;-1,0,0;0,-1,0]* T_i_c flight version ####
   # data: [ -0.06016175,0.00054603, -0.00046837 ]

T_camera_imu: 1  # if we set the R and T as IMU to camera, we need to give an T to them
# T_camera_imu: 0  # if we set the R and T as c to I

#time surface map
ignore_polarity: 0 #true 1 false 0;
decay_ms: 20 # 20
median_blur_kernel_size: 0 #1 or 0
feature_filter_threshold: 0.050


#feature traker paprameters
TS_LK_threshold: 128.0   # the feature detection is based on the time surface
max_cnt: 200            # max feature number in feature tracking
min_dist: 10            # min distance between two features 
freq: 10 #10                # frequence (Hz) of publish tracking result. At least 10Hz for good estimation. If set 0, the frequence will be same as raw image 
F_threshold: 1.0        # ransac threshold (pixel)
show_track: 1           # publish tracking image as topic
flow_back: 1            # perform forward and backward optical flow to improve feature tracking accuracy
equalize: 0             # if image is too dark or light, trun on equalize to find enough features
fisheye: 0              # if using fisheye, trun on it. A circle mask will be loaded to remove edge noisy points
Num_of_thread: 2        #number of the threads for the big event data process

#optimization parameters
max_solver_time: 0.04  # max solver itration time (ms), to guarantee real time
max_num_iterations: 8   # max solver itrations, to guarantee real time
keyframe_parallax: 10.0 # keyframe selection threshold (pixel)

#imu parameters       The more accurate parameters you provide, the better performance
acc_n: 0.2 #4.2153479580575477e-02 #0.1          # accelerometer measurement noise standard deviation. #0.2
gyr_n: 0.05 #3.4869979619824697e-03 #0.01         # gyroscope measurement noise standard deviation.     #0.05 
acc_w: 0.002 #8.5654389798364998e-04 #0.0002          # accelerometer bias random work noise standard deviation.  #0.02
gyr_w: 4.0e-5 #4.4740603706140853e-05 #2.0e-5      # gyroscope bias random work noise standard deviation.     #4.0e-5
g_norm: 9.80766         # gravity magnitude

#loop closure parameters
loop_closure: 1                    # start loop closure
loop_closure_topic: "/event_detector/timesurface_map"   #use the time surface for loop closure
load_previous_pose_graph: 0        # load and reuse previous pose graph; load from 'pose_graph_save_path'
fast_relocalization: 0             # useful in real-time and large project
pose_graph_save_path: "/home/cpy/catkin_ws_dvs/src/EVIO/pose_graph/output/pose_graph/" # save and load path

#unsynchronization parameters
estimate_td: 1                      # online estimate time offset between camera and imu
td: 0.00777437                             # initial value of time offset. unit: s. readed image clock + td = real image clock (IMU clock)

#rolling shutter parameters
rolling_shutter: 0                  # 0: global shutter camera, 1: rolling shutter camera
rolling_shutter_tr: 0               # unit: s. rolling shutter read out time per frame (from data sheet). 

#visualization parameters
save_image: 1                   #  (DEBUG_IMAGE)   save image in pose graph for visualization prupose; you can close this function by setting 0 
visualize_imu_forward: 1        # output imu forward propogation to achieve low latency and high frequence results
visualize_camera_size: 0.4      # size of camera marker in RVIZ
save_loop_match: 1

super_eventpoint:
  max_keypoints: 400 #200
  keypoint_threshold: 0.015 #0.004, 0.015
  remove_borders: 4 
  input_tensor_names: 
    - "input"
  output_tensor_names:
    - "scores"
    - "descriptors"
  onnx_file: "super_eventpoint.onnx"
  engine_file: "super_eventpoint.engine"
  dla_core: -1

super_eventmatch:
  image_width: 320 # 346
  image_height: 240 # 260
  input_tensor_names:
    - "keypoints_0"
    - "scores_0"
    - "descriptors_0"
    - "keypoints_1"
    - "scores_1"
    - "descriptors_1"
  output_tensor_names:
    - "scores"
  onnx_file: "super_eventmatch.onnx"
  engine_file: "super_eventmatch.engine"
  dla_core: -1
